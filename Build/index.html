<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LuriaKei</title>
    <link rel="icon" href="https://raw.githubusercontent.com/LuriaReimeiko/LuriaReimeiko.github.io/refs/heads/main/favicon.ico">
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
</head>

<body>

    <div id="player">
        <div id="game-wrap">
            <iframe id="game-frame" src="./Game.html" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>

        <!-- Controls bar -->
        <div id="controls">
            <!-- Volume -->
            <span class="vol-icon" id="vol-icon" title="Mute">
                <svg id="icon-vol-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                </svg>
                <svg id="icon-vol-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                    <line x1="23" y1="9" x2="17" y2="15" />
                    <line x1="17" y1="9" x2="23" y2="15" />
                </svg>
            </span>

            <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="1" title="Volume" />

            <div class="divider"></div>
            <span id="vol-percent">100%</span>
            <div class="divider"></div>

            <!-- Fullscreen -->
            <button id="fs-btn" title="Fullscreen">
                <svg id="icon-fs-enter" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 3 21 3 21 9" />
                    <polyline points="9 21 3 21 3 15" />
                    <line x1="21" y1="3" x2="14" y2="10" />
                    <line x1="3" y1="21" x2="10" y2="14" />
                </svg>
                <svg id="icon-fs-exit" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <polyline points="4 14 10 14 10 20" />
                    <polyline points="20 10 14 10 14 4" />
                    <line x1="10" y1="14" x2="3" y2="21" />
                    <line x1="21" y1="3" x2="14" y2="10" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Social links -->
    <div id="socials">
        <a class="btn" href="https://github.com/LuriaReimeiko/TsuyuGame" target="_blank" rel="noopener">
            <i class="bxl bx-github"></i>
            GitHub
        </a>

        <a class="btn" href="https://github.com/LuriaReimeiko/TsuyuGame/releases/latest" target="_blank" rel="noopener">
            <i class="bxl bx-github"></i>
            Download
        </a>

        <a class="btn" href="https://youtube.com/@LuriaReimeiko" target="_blank" rel="noopener">
            <i class="bxl bx-youtube"></i>
            YouTube
        </a>
    </div>

    <script src="index.js"></script>
</body>

</html>
